name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-checks-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            turbo-checks-${{ runner.os }}-${{ github.ref }}-
            turbo-checks-${{ runner.os }}-refs/heads/main-
      - run: pnpm install --frozen-lockfile --reporter append-only
      - run: pnpm turbo run lint:ci typecheck format:check:ci deps:check syncpack:check:ci

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-test-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ github.ref }}-
            turbo-test-${{ runner.os }}-refs/heads/main-
      - run: pnpm install --frozen-lockfile --reporter append-only
      - run: pnpm turbo run test:coverage:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - uses: davelosert/vitest-coverage-report-action@v2
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --reporter append-only
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e 'console.log(require("@playwright/test/package.json").version)')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-chromium
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium > /dev/null
      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium > /dev/null
      - run: pnpm test:e2e --reporter dot
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14

  law-mutation:
    name: law mutation (scoped Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --reporter append-only
      - name: Run Stryker on law tests only (L2.4 ratchet)
        run: |
          npx stryker run \
            --mutate 'packages/host/tests/laws/**/*.ts' \
            --logLevel warn \
            --reporters progress,json \
            --coverageAnalysis perTest \
            --ignoreStatic true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: law-mutation-report
          path: reports/mutation/
          retention-days: 14

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          wget -qO- "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
      - run: gitleaks detect --no-banner --log-level warn --config .gitleaks.toml
      - name: Install hadolint
        run: |
          HADOLINT_VERSION=2.12.0
          sudo wget -qO /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          sudo chmod +x /usr/local/bin/hadolint
      - run: hadolint .devcontainer/Dockerfile
