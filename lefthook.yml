# Lefthook - Git hooks manager
# https://github.com/evilmartians/lefthook
#
# Install: lefthook install (runs automatically via pnpm prepare)
# Skip once: git commit --no-verify (use sparingly!)

pre-commit:
  parallel: true
  commands:
    # Prevent secrets from being committed
    gitleaks:
      glob: '*.{js,cjs,mjs,ts,jsx,tsx,py,json,yaml,yml,env,sh}'
      run: gitleaks protect --staged --no-banner --config .gitleaks.toml

    # Lint Dockerfiles
    hadolint:
      glob: '**/Dockerfile*'
      run: hadolint {staged_files}

    # Lint and auto-fix JavaScript/TypeScript with oxlint
    oxlint:
      glob: '*.{js,cjs,mjs,ts,jsx,tsx}'
      run: pnpm oxlint --fix {staged_files} && git add {staged_files}
      stage_fixed: true

    # Format and auto-fix with Prettier
    prettier:
      glob: '*.{js,cjs,mjs,ts,jsx,tsx,json,md,yml,yaml,html,css}'
      run: pnpm prettier --write {staged_files} && git add {staged_files}
      stage_fixed: true

    # Dependency version consistency
    syncpack:
      glob: '**/package.json'
      run: pnpm syncpack:check
      fail_text: |
        Recurring version drift? → docs/PAIN.md (P2 + candidate fix)

    # Hex architecture boundaries (L2.14) — catches adapter/port/domain import violations.
    # Runs at commit time so violations surface immediately, not only at push.
    deps-check:
      glob: 'packages/host/src/**/*.ts'
      run: pnpm deps:check
      fail_text: |
        Dep boundary violated (L2.14). Fix the import before committing.
        Pattern ref → .claude/patterns/dep-boundary.md
        Recurring? → docs/PAIN.md (P1/P2 + candidate fix)

    # Effect coding-pattern guardrails (oxlint lacks no-restricted-syntax)
    # Catches: Date.now()/new Date() in src → use Clock; Effect.runPromise in tests → use it.effect
    effect-patterns:
      glob: 'packages/host/**/*.ts'
      run: .claude/hooks/check-effect-patterns.sh
      fail_text: |
        Effect pattern violation. See error above for the specific fix.
        Pattern ref → .claude/patterns/effect-test-pattern.md
        Recurring? → docs/PAIN.md (P2 + candidate fix)

    # Fast regression guard — only runs tests related to staged host files (P8 fix).
    # Full suite stays at pre-push; this catches obvious breakage before context shifts.
    test-changed:
      glob: 'packages/host/**/*.ts'
      run: pnpm vitest run --changed HEAD --passWithNoTests

# CI lint group — check-only versions of pre-commit hooks (no auto-fix)
# Usage: lefthook run ci
ci:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks detect --no-banner --config .gitleaks.toml

    hadolint:
      glob: '**/Dockerfile*'
      run: hadolint {all_files}

    oxlint:
      run: pnpm lint

    prettier:
      run: pnpm format:check

    syncpack:
      run: pnpm syncpack:check

    deps-check:
      run: pnpm deps:check

pre-push:
  piped: true
  commands:
    merge-main:
      priority: 1
      run: |
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ]; then
          echo "Direct push to main is not allowed — open a PR instead."
          exit 1
        fi
        git fetch origin main
        git merge origin/main --no-edit
    # Syncpack + knip run unconditionally at push — catch drift/dead-code before it reaches remote.
    syncpack:
      priority: 2
      run: pnpm syncpack:check:ci
      fail_text: |
        Semver drift detected. Run `pnpm syncpack:fix` then re-commit package.json.
        Recurring? → docs/PAIN.md (P2 + candidate fix)
    knip:
      priority: 2
      run: pnpm knip:ci
      fail_text: |
        Unused files, exports, or dependencies detected. Run `pnpm knip` for details.
        Recurring? → docs/PAIN.md (P2 + candidate fix)
    checks:
      priority: 3
      run: pnpm turbo run deps:check typecheck test:coverage:ci --output-logs errors-only
      fail_text: |
        Build/test/typecheck failed. Check errors above.
        Recurring pattern? → docs/PAIN.md (P1/P2 + candidate fix)
        Pattern ref → .claude/patterns/
    e2e:
      priority: 4
      run: pnpm test:e2e

commit-msg:
  commands:
    conventional:
      run: >
        grep -qE "^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?: .+" {1}
        || { echo "Commit message must follow Conventional Commits: <type>(<scope>): <desc>"; exit 1; }
